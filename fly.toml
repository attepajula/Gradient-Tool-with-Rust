app = "frontend-dry-meadow-1366"
primary_region = "arn"

[build]

[env]
  ALLOWED_ORIGIN = "https://gradient.atte.works"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
